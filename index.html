<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Sense Design \u2014 AI-assisted interior and architectural design studio for the Saudi market." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>Sense Design</title>
    <style>
      #nad-splash { position: fixed; inset: 0; z-index: 9999; background: #1B6045; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; transition: opacity .45s ease; }
      #nad-splash img { width: min(46vw, 200px); animation: nad-splash-pulse 2.2s ease-in-out infinite; }
      #nad-splash .bar { width: 150px; height: 2px; background: rgba(255, 255, 255, 0.18); border-radius: 100px; overflow: hidden; }
      #nad-splash .bar span { display: block; width: 40%; height: 100%; background: #fff; border-radius: 100px; animation: nad-splash-sweep 1.4s ease-in-out infinite; }
      @keyframes nad-splash-pulse { 0%, 100% { transform: scale(1); opacity: 0.92; } 50% { transform: scale(1.045); opacity: 1; } }
      @keyframes nad-splash-sweep { 0% { transform: translateX(-110%); } 100% { transform: translateX(420%); } }
      @media (prefers-reduced-motion: reduce) { #nad-splash img, #nad-splash .bar span { animation: none; } }
    </style>
  </head>
  <body>
    <div id="nad-splash" aria-hidden="true">
      <img src="/assets/sense-logo-light.png" alt="" />
      <div class="bar"><span></span></div>
    </div>
    <div id="root"></div>
    <script>
      // Branded startup splash: stays for at least 900ms, fades once the app
      // has loaded (4s safety timeout so it can never get stuck).
      (function () {
        var start = Date.now();
        var done = false;
        function hide() {
          if (done) return; done = true;
          var el = document.getElementById('nad-splash');
          if (!el) return;
          var wait = Math.max(0, 900 - (Date.now() - start));
          setTimeout(function () {
            el.style.opacity = '0';
            setTimeout(function () { if (el.parentNode) el.parentNode.removeChild(el); }, 500);
          }, wait);
        }
        window.addEventListener('load', hide);
        setTimeout(hide, 4000);
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
